<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Browse skills — Loom</title>
    <meta name="description" content="Search and browse the Loom skill repository for Claude Code, Codex, Cursor, and other AI agents." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cg fill='none' stroke='%234c6d95' stroke-width='2'%3E%3Cpath d='M4 8h16M4 16h16M8 4v16M16 4v16'/%3E%3C/g%3E%3C/svg%3E" />
    <script>
      (function () {
        try {
          var t =
            localStorage.getItem("loom-theme") ||
            (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="nav">
      <div class="nav__inner">
        <a class="brand" href="index.html" aria-label="Loom home">
          <svg class="brand__mark" viewBox="0 0 24 24" aria-hidden="true">
            <g fill="none" stroke="currentColor" stroke-width="1.6" style="color: var(--accent)">
              <path d="M4 8h16M4 16h16M8 4v16M16 4v16" />
            </g>
          </svg>
          Loom
        </a>
        <nav class="nav__links" aria-label="Primary">
          <a class="nav__link" data-page="browse.html" href="browse.html">Browse</a>
          <a class="nav__link" data-page="docs.html" href="docs.html">Docs</a>
          <a class="nav__link nav__link--hide-sm" href="https://github.com/wess/loom">GitHub</a>
          <button class="icon-btn theme-toggle" type="button" aria-label="Toggle color theme">
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          </button>
        </nav>
      </div>
    </header>

    <main id="main">
      <div class="wrap">
        <div class="browse-head">
          <h1>Browse skills</h1>
          <p class="muted">Search the shared repository. Install any skill with <code>loom install &lt;name&gt;</code>.</p>

          <div class="search">
            <svg class="search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <input
              id="q"
              type="search"
              placeholder="Search by name, description, or keyword…"
              autocomplete="off"
              spellcheck="false"
              aria-label="Search skills"
            />
          </div>

          <div class="filters" id="filters" role="group" aria-label="Filter by agent compatibility">
            <span class="filters__label">Agent:</span>
            <!-- Compatibility chips injected from the data. -->
          </div>
        </div>

        <p class="result-count" id="count" aria-live="polite"></p>

        <div id="results" aria-live="polite">
          <div class="state"><div class="spinner" aria-hidden="true"></div>Loading the skill index…</div>
        </div>
      </div>
    </main>

    <!-- Detail modal -->
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
      <div class="modal__panel" id="modalPanel">
        <button class="icon-btn modal__close" id="modalClose" type="button" aria-label="Close details">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
        <div id="modalBody"><!-- filled by search.js --></div>
      </div>
    </div>

    <footer class="footer">
      <div class="wrap footer__inner">
        <span>Loom — the package manager for AI skills.</span>
        <nav class="footer__links" aria-label="Footer">
          <a href="index.html">Home</a>
          <a href="docs.html">Docs</a>
          <a href="https://github.com/wess/loom">GitHub</a>
        </nav>
      </div>
    </footer>

    <script src="app.js"></script>
    <script src="search.js"></script>
  </body>
</html>
