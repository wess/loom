name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build, test, lint manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --release

      - name: Lint every manifest
        env:
          LOOM_HOME: ${{ runner.temp }}/loom
        run: cargo run --release -- lint

      # Prove every manifest indexes cleanly, but don't require the contributor
      # to commit the result: the `reindex` workflow rebuilds and commits
      # docs/skills.json on main after merge. We index to a throwaway path so a
      # PR that adds a skill without regenerating the index still passes.
      - name: Validate the website index builds
        env:
          LOOM_HOME: ${{ runner.temp }}/loom
        run: cargo run --release -- index --out "${{ runner.temp }}/skills.json"
